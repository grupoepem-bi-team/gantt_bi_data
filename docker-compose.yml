services:
  db:
    image: postgres:16-alpine
    container_name: gantt_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gantt_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gantt_password}
      POSTGRES_DB: ${POSTGRES_DB:-gantt_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gantt_user} -d ${POSTGRES_DB:-gantt_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: gantt_api
    restart: always
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://gantt_user:gantt_password@db:5432/gantt_db}
      PORT: 3000
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-random-64-chars}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:-ChangeMeNow1}
      JEAN_INITIAL_PASSWORD: ${JEAN_INITIAL_PASSWORD:-}
      JESUS_INITIAL_PASSWORD: ${JESUS_INITIAL_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: gantt_app
    restart: always
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: gantt_network
    driver: bridge