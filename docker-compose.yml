version: '3.8'

services:
  gantt-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
      - VITE_APP_TITLE=Vue Gantt Chart
      - VITE_APP_VERSION=1.0.0
    volumes:
      - ./data:/usr/share/nginx/html/data
    restart: unless-stopped
    networks:
      - gantt-network

networks:
  gantt-network:
    driver: bridge